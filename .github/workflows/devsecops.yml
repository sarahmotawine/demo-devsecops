name: DevSecOps Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # JOB 1 - Detectar secrets vazados (GitLeaks)
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # JOB 2 - Analise estatica SAST (Semgrep)
  sast-scan:
    name: SAST Scan
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with:
          config: p/security-audit p/owasp-top-ten p/python

  # JOB 3 - Analise de dependencias SCA (Trivy)
  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

  # JOB 4 - Relatorio final
  security-report:
    name: Relatorio de Seguranca
    runs-on: ubuntu-latest
    needs: [secret-scan, sast-scan, dependency-scan]
    if: always()
    steps:
      - name: Resumo
        run: |
          echo '# Relatorio DevSecOps' >> $GITHUB_STEP_SUMMARY
          echo '| Check | Status |' >> $GITHUB_STEP_SUMMARY
          echo '|-------|--------|' >> $GITHUB_STEP_SUMMARY
          echo '| Secret Scan  | ${{ needs.secret-scan.result }}     |' >> $GITHUB_STEP_SUMMARY
          echo '| SAST Scan    | ${{ needs.sast-scan.result }}       |' >> $GITHUB_STEP_SUMMARY
          echo '| Dep Scan     | ${{ needs.dependency-scan.result }} |' >> $GITHUB_STEP_SUMMARY